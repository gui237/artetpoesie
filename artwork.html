<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Œuvre · Art & Poésie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f6eef1;
      --surface:#ffffff;
      --text:#1f1f1f;
      --muted:#5b4a3f;
      --accent:#b55f71;
      --accent-soft:#f7d8df;
      --accent-2:#5f8d8b;
      --shadow:rgba(0,0,0,.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;
      font-family:'Inter',sans-serif;
      background:linear-gradient(180deg, #faf3f0 0%, #f4efe8 100%);
      color:var(--text);
    }
    header{
      position:sticky;
      top:0;
      width:100%;
      padding:24px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,247,242,.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(181,95,113,.12);
      z-index:10;
    }
    .logo{
      font-family:'Cormorant Garamond',serif;
      font-size:2rem;
      font-weight:700;
      color:var(--accent);
      text-decoration:none;
    }
    nav a,.back-link{
      text-decoration:none;
      color:var(--muted);
      font-size:.95rem;
    }
    nav a{margin-left:24px}
    main{
      padding:72px 8% 96px;
    }
    .detail{
      width:min(1040px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:32px;
    }
    .detail.has-image{
      grid-template-columns:minmax(300px,.95fr) minmax(320px,1.05fr);
      align-items:start;
    }
    .image-wrap{
      background:var(--surface);
      padding:18px;
      border-radius:18px;
      box-shadow:0 16px 36px var(--shadow);
    }
    .image-wrap img{
      width:100%;
      max-height:72vh;
      object-fit:contain;
      display:block;
      border-radius:12px;
      background:#fbf7f4;
    }
    .content{
      background:var(--surface);
      padding:42px;
      border-radius:18px;
      box-shadow:0 16px 36px var(--shadow);
      border-left:6px solid rgba(181,95,113,.3);
    }
    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.4rem, 5vw, 4.7rem);
      line-height:1.05;
      color:var(--accent-2);
      margin-bottom:12px;
      overflow-wrap:anywhere;
    }
    .author{
      color:var(--muted);
      font-style:italic;
      margin-bottom:28px;
    }
    .poem{
      white-space:pre-wrap;
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1.25rem, 2vw, 1.7rem);
      line-height:1.7;
      color:var(--text);
    }
    .empty{
      width:min(720px,100%);
      margin:0 auto;
      background:var(--surface);
      padding:40px;
      border-radius:18px;
      box-shadow:0 16px 36px var(--shadow);
      color:var(--muted);
      line-height:1.7;
    }
    .button{
      margin-top:26px;
      padding:12px 22px;
      border-radius:50px;
      color:#fff;
      background:linear-gradient(135deg, var(--accent), #8d7fb3);
      box-shadow:0 16px 30px rgba(181,95,113,.18);
      text-decoration:none;
      display:inline-block;
    }
    footer{
      text-align:center;
      padding:40px;
      opacity:.8;
      color:var(--muted);
    }
    @media(max-width:820px){
      header{align-items:flex-start;gap:16px;flex-direction:column}
      nav a{margin:0 18px 0 0}
      main{padding-top:48px}
      .detail.has-image{grid-template-columns:1fr}
      .content{padding:30px}
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">Art & Poésie</a>
    <nav>
      <a href="/#galerie">Galerie</a>
      <a href="/#create">Publier</a>
      <a href="/#journal">Journal</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <main id="main">
    <div class="empty">Chargement de l'œuvre...</div>
  </main>

  <footer>
    © 2026 Art & Poésie — Tous droits réservés
  </footer>

  <script>
    const escapeHtml = (str) => String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));

    const mainEl = document.getElementById('main');
    const params = new URLSearchParams(window.location.search);
    const artworkId = params.get('id');

    const renderMessage = (message) => {
      mainEl.innerHTML = `
        <div class="empty">
          ${escapeHtml(message)}
          <br />
          <a class="button" href="/#galerie">Retour à la galerie</a>
        </div>
      `;
    };

    const renderArtwork = (artwork) => {
      const image = artwork.hasImage
        ? `<figure class="image-wrap"><img src="/api/artworks/${encodeURIComponent(artwork.id)}/image" alt="${escapeHtml(artwork.title)}" /></figure>`
        : '';
      const poem = artwork.text ? `<div class="poem">${escapeHtml(artwork.text)}</div>` : '';
      const layoutClass = artwork.hasImage ? 'detail has-image' : 'detail';

      document.title = `${artwork.title} · Art & Poésie`;
      mainEl.innerHTML = `
        <article class="${layoutClass}">
          ${image}
          <div class="content">
            <a class="back-link" href="/#galerie">← Retour à la galerie</a>
            <h1>${escapeHtml(artwork.title)}</h1>
            <div class="author">— ${escapeHtml(artwork.author || 'Anonyme')}</div>
            ${poem}
          </div>
        </article>
      `;
    };

    const loadArtwork = async () => {
      if (!artworkId){
        renderMessage('Aucune œuvre sélectionnée.');
        return;
      }

      try {
        const res = await fetch('/api/artworks', { headers: { Accept: 'application/json' } });
        if (!res.ok) throw new Error('Échec du chargement');
        const data = await res.json();
        const artwork = (data.artworks || []).find((item) => item.id === artworkId);
        if (!artwork){
          renderMessage('Cette œuvre est introuvable ou n’est pas publiée.');
          return;
        }
        renderArtwork(artwork);
      } catch (err){
        renderMessage('Impossible de charger cette œuvre pour l’instant.');
      }
    };

    loadArtwork();
  </script>
</body>
</html>
